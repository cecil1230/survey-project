<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-Cycle Report Survey | 中期报告调查</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        .card-icon { font-size: 4em; margin-bottom: 15px; }
        .card h2 { color: #333; margin-bottom: 10px; font-size: 1.5em; }
        .card .subtitle { color: #666; font-size: 1em; }
        .card .questions { 
            display: inline-block;
            margin-top: 15px;
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #555;
        }
        .parent-card { border-top: 4px solid #ff6b6b; }
        .teacher-card { border-top: 4px solid #4ecdc4; }
        .student-card { border-top: 4px solid #45b7d1; }
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Mid-Cycle Report Survey</h1>
            <p>中期报告调查 | 学校评估问卷</p>
        </div>
        
        <div class="cards">
            <a href="parent-survey.html" class="card parent-card">
                <div class="card-icon">👨‍👩‍👧</div>
                <h2>家长调查</h2>
                <p class="subtitle">Parent Survey</p>
                <span class="questions">12 questions | 12道题</span>
            </a>
            
            <a href="teacher-survey.html" class="card teacher-card">
                <div class="card-icon">👨‍🏫</div>
                <h2>教师调查</h2>
                <p class="subtitle">Teacher Survey</p>
                <span class="questions">20 questions | 20道题</span>
            </a>
            
            <a href="student-survey.html" class="card student-card">
                <div class="card-icon">🎒</div>
                <h2>学生调查</h2>
                <p class="subtitle">Student Survey</p>
                <span class="questions">9 questions | 9道题</span>
            </a>
        </div>
        
        <div class="footer">
            <p>Select a survey to begin | 选择一个调查问卷开始</p>
        </div>
    </div>
</body>
</html>
